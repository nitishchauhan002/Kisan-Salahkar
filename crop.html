<!DOCTYPE html>
<html>
<head>
    <title>Crop Recommendation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
    <div class="nav-left">🌾 Crop Recommendation</div>

    <div class="nav-right">
        <a href="dashboard.html">⬅ Back</a>
    </div>
</div>

<!-- ✅ HERO SECTION -->
<div class="hero small-hero">
    <h1>Choose the Best Crop for Your Soil</h1>
    <p>Enter Soil & Environmental Details</p>
</div>


<!-- ✅ FORM CARD -->
<div class="page-center">
    <div class="info-card">

        <h2>Soil Details</h2>

        <input type="number" placeholder="Nitrogen (N)">
        <input type="number" placeholder="Phosphorus (P)">
        <input type="number" placeholder="Potassium (K)">
        <input type="number" step="0.1" placeholder="pH Level">

        <h3>Weather Conditions</h3>

        <input type="number" placeholder="Temperature (°C)">
        <input type="number" placeholder="Humidity (%)">
        <input type="number" placeholder="Rainfall (mm)">

        <button>
            Find Best Crop
        </button>

    </div>
</div>

</body>
</html>
